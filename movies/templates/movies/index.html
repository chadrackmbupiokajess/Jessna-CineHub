{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessna CinéHub</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="main-header">
    <div class="decorative-bubble bubble-1"></div>
    <div class="decorative-bubble bubble-2"></div>

    <div class="header-container">
        <!-- Top Bar: Logo, Mobile Toggle, Search -->
        <div class="navbar">
            <div class="logo-container">
                <a href="{% url 'index' %}" class="logo-text">
                    <img src="{% static 'logo Jess CinéHub.png' %}" alt="Logo" class="logo-img">
                    Jessna<span>CinéHub</span>
                </a>
            </div>

            <!-- Hamburger Button (Mobile Only) -->
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>

            <!-- Navigation Links (Hidden on mobile initially) -->
            <nav class="nav-links" id="nav-links">
                <a href="{% url 'index' %}" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <i class="fas fa-home"></i> Accueil
                </a>
                <a href="{% url 'about' %}" class="nav-link {% if 'about' in request.path %}active{% endif %}">
                    <i class="fas fa-info-circle"></i> À propos
                </a>
            </nav>

            <!-- Search Bar (Desktop) -->
            <div class="search-container desktop-search">
                <form method="get" action="{% url 'index' %}">
                    <input type="text" name="query" placeholder="Rechercher..." value="{{ query }}">
                    <input type="hidden" name="category" value="{{ category }}">
                    <button type="submit"><i class="fas fa-search"></i></button>
                </form>
            </div>
        </div>

        <!-- Mobile Search (Visible only on mobile below navbar) -->
        <div class="search-container mobile-search">
            <form method="get" action="{% url 'index' %}">
                <input type="text" name="query" placeholder="Rechercher un film ou une série..." value="{{ query }}">
                <input type="hidden" name="category" value="{{ category }}">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs">
            <a href="{% url 'index' %}?category=all" class="tab-link {% if category == 'all' or not category %}active{% endif %}">
                <i class="fas fa-globe"></i> Tout
            </a>
            <a href="{% url 'index' %}?category=movie" class="tab-link {% if category == 'movie' %}active{% endif %}">
                <i class="fas fa-ticket-alt"></i> Films
            </a>
            <a href="{% url 'index' %}?category=tv" class="tab-link {% if category == 'tv' %}active{% endif %}">
                <i class="fas fa-tv"></i> Séries
            </a>
        </div>
    </div>
</header>

<main>
    {% if query %}
        <h2 class="search-title">Résultats pour "{{ query }}"</h2>
    {% endif %}

    <div class="movies-grid" id="movies-grid">
        {% include "movies/partials/movie_cards.html" with movies=movies %}
    </div>

    <div id="infinite-scroll-loader" class="loader-container" style="display: none;">
        <div class="loader-spinner"></div>
    </div>
</main>

<!-- Movie/TV Details Overlay -->
<div id="movie-overlay" class="overlay">
    <div class="overlay-content">
        <span class="close-overlay" role="button" aria-label="Fermer" data-close="movie-overlay">&times;</span>
        <img id="overlay-poster" src="" alt="Affiche">
        <div class="overlay-details">
            <h2 id="overlay-title"></h2>
            <p id="overlay-overview"></p>
            
            <!-- Movie Actions -->
            <div id="movie-actions" class="overlay-actions">
                <button id="overlay-trailer-btn" class="trailer-btn">🎬 Bande-annonce</button>
                <button id="overlay-watch-btn" class="watch-btn">🍿 Voir le film</button>
            </div>

            <!-- TV Show Specific Section -->
            <div id="tv-show-details" style="display: none; margin-top: 1.5rem;">
                <h3 style="color: var(--accent-color); margin-bottom: 0.5rem;">Saisons & Épisodes</h3>
                <select id="season-select" class="season-select">
                    <option value="" disabled selected>Chargement des saisons...</option>
                </select>
                <div id="episodes-list" class="episodes-list">
                    <!-- Episodes will be populated here -->
                </div>
            </div>

            <div class="overlay-actions" style="margin-top: 1rem;">
                <button class="quit-btn" data-close="movie-overlay">Quitter</button>
            </div>
        </div>
    </div>
</div>

<!-- Trailer Video Overlay -->
<div id="trailer-overlay" class="overlay">
    <div class="video-container">
        <span class="close-overlay" role="button" aria-label="Fermer" data-close="trailer-overlay">&times;</span>
        
        <div class="back-button-container" style="position: absolute; top: -50px; left: 0; z-index: 1002;">
            <button id="back-to-details-btn" class="back-btn" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                <span>&larr;</span> Retour
            </button>
        </div>

        <div class="iframe-wrapper">
            <iframe id="trailer-iframe" src="" title="Video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        
        <div class="video-actions">
            <a id="youtube-watch-btn" href="#" class="youtube-btn" target="_blank" rel="noopener noreferrer" style="display:none;">Voir sur YouTube</a>
            <button class="quit-btn" data-close="trailer-overlay">Fermer le lecteur</button>
        </div>
    </div>
</div>

{{ movies|json_script:"movies-data" }}

<script>
    window.paginationData = {
        currentPage: {{ current_page }},
        totalPages: {{ total_pages }},
        query: "{{ query|escapejs }}",
        category: "{{ category|escapejs }}"
    };
</script>

<script src="{% static 'script.js' %}"></script>
</body>
</html>
